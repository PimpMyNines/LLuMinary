repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: check-toml
    -   id: debug-statements
    -   id: mixed-line-ending
        args: ['--fix=lf']

-   repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
    -   id: black
        language_version: python3

-   repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
    -   id: isort
        args: ["--profile", "black"]

-   repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: 'v0.3.1'
    hooks:
    -   id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
    -   id: mypy
        additional_dependencies: [types-requests, types-PyYAML, pydantic>=2.0.0]
        exclude: ^tests/
        args: [--no-strict-optional, --ignore-missing-imports]

# Check that updated lluminary module names are used, not llmhandler
-   repo: local
    hooks:
    -   id: check-module-names
        name: Check for old module names
        entry: grep -r "llmhandler" --include="*.py" src/ tests/
        language: system
        pass_filenames: false
        types: [python]
        exclude: ^(debug/|docs/|examples/)
